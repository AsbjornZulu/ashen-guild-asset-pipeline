name: Process game assets

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "process-fx"
        type: choice
        options:
          - clean
          - upscale
          - slice-grid
          - slice-components
          - process-fx
      input_file:
        description: "Input PNG inside the repo, for example assets_raw/particles.png"
        required: true
        default: "assets_raw/input.png"
      output_dir:
        description: "Output folder"
        required: true
        default: "assets_processed/output"
      key:
        description: "Chroma key color. Use auto for process-fx"
        required: true
        default: "auto"
      tolerance:
        description: "Simple chroma tolerance for clean/grid/component modes"
        required: true
        default: "55"
      scale:
        description: "Upscale factor"
        required: true
        default: "4"
      rows:
        description: "Grid rows for slice-grid"
        required: true
        default: "4"
      cols:
        description: "Grid columns for slice-grid"
        required: true
        default: "14"
      prefix:
        description: "Output file prefix"
        required: true
        default: "sprite"
      palette:
        description: "FX recolor palette"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - blood
          - mud
      transparency_threshold:
        description: "FX Color-to-Alpha transparency threshold"
        required: true
        default: "0.036"
      opacity_threshold:
        description: "FX Color-to-Alpha opacity threshold"
        required: true
        default: "0.80"
      knockout_tolerance:
        description: "Remove pixels still close to the FX chroma color"
        required: true
        default: "24"
      despill_strength:
        description: "FX border despill strength from 0 to 1"
        required: true
        default: "0.80"
      merge_distance:
        description: "Merge nearby FX fragments into one sprite"
        required: true
        default: "24"
      min_area:
        description: "Minimum visible pixel area for automatic extraction"
        required: true
        default: "6"
      pad:
        description: "Transparent padding around extracted sprites"
        required: true
        default: "6"

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process asset
        shell: bash
        run: |
          set -euo pipefail
          MODE="${{ inputs.mode }}"
          INPUT="${{ inputs.input_file }}"
          OUTPUT_DIR="${{ inputs.output_dir }}"
          KEY="${{ inputs.key }}"
          TOL="${{ inputs.tolerance }}"
          SCALE="${{ inputs.scale }}"
          ROWS="${{ inputs.rows }}"
          COLS="${{ inputs.cols }}"
          PREFIX="${{ inputs.prefix }}"
          PALETTE="${{ inputs.palette }}"
          TRANSPARENCY_THRESHOLD="${{ inputs.transparency_threshold }}"
          OPACITY_THRESHOLD="${{ inputs.opacity_threshold }}"
          KNOCKOUT_TOLERANCE="${{ inputs.knockout_tolerance }}"
          DESPILL_STRENGTH="${{ inputs.despill_strength }}"
          MERGE_DISTANCE="${{ inputs.merge_distance }}"
          MIN_AREA="${{ inputs.min_area }}"
          PAD="${{ inputs.pad }}"

          mkdir -p "$OUTPUT_DIR"

          if [ "$MODE" = "upscale" ]; then
            python3 tools/ashen_asset_pipeline.py upscale "$INPUT" "$OUTPUT_DIR/${PREFIX}_upscaled_${SCALE}x.png" --scale "$SCALE"
          elif [ "$MODE" = "clean" ]; then
            CLEAN_KEY="$KEY"
            if [ "$CLEAN_KEY" = "auto" ]; then CLEAN_KEY="#FF00FF"; fi
            python3 tools/ashen_asset_pipeline.py clean "$INPUT" "$OUTPUT_DIR/${PREFIX}_clean.png" --key "$CLEAN_KEY" --tolerance "$TOL" --despill --crop
          elif [ "$MODE" = "slice-grid" ]; then
            GRID_KEY="$KEY"
            if [ "$GRID_KEY" = "auto" ]; then GRID_KEY="#FF00FF"; fi
            python3 tools/ashen_asset_pipeline.py slice-grid "$INPUT" "$OUTPUT_DIR" --rows "$ROWS" --cols "$COLS" --key "$GRID_KEY" --tolerance "$TOL" --despill --pad "$PAD" --prefix "$PREFIX"
          elif [ "$MODE" = "slice-components" ]; then
            COMPONENT_KEY="$KEY"
            if [ "$COMPONENT_KEY" = "auto" ]; then COMPONENT_KEY="#FF00FF"; fi
            python3 tools/ashen_asset_pipeline.py slice-components "$INPUT" "$OUTPUT_DIR" --key "$COMPONENT_KEY" --tolerance "$TOL" --despill --min-area "$MIN_AREA" --pad "$PAD" --prefix "$PREFIX"
          elif [ "$MODE" = "process-fx" ]; then
            python3 tools/process_fx.py "$INPUT" "$OUTPUT_DIR" \
              --key "$KEY" \
              --transparency-threshold "$TRANSPARENCY_THRESHOLD" \
              --opacity-threshold "$OPACITY_THRESHOLD" \
              --knockout-tolerance "$KNOCKOUT_TOLERANCE" \
              --despill-strength "$DESPILL_STRENGTH" \
              --palette "$PALETTE" \
              --merge-distance "$MERGE_DISTANCE" \
              --min-area "$MIN_AREA" \
              --pad "$PAD" \
              --prefix "$PREFIX"
          else
            echo "Unknown mode: $MODE"
            exit 1
          fi

      - name: Commit processed assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Process game assets"
          file_pattern: "assets_processed/**"

      - name: Upload processed assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-assets
          path: assets_processed/
